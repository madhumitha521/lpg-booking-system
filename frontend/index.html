<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LPG Gas Booking System</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="config.js"></script>
    <style>
        /* Netflix-Style Full Screen Animation Keyframes */
        @keyframes mExpandFull {
            0% {
                transform: scale(0.1);
                opacity: 0;
                letter-spacing: -50px;
            }
            20% {
                transform: scale(0.5);
                opacity: 1;
                letter-spacing: -20px;
            }
            40% {
                transform: scale(1);
                letter-spacing: -5px;
            }
            70% {
                transform: scale(3);
                letter-spacing: 0px;
            }
            85% {
                transform: scale(8);
                letter-spacing: 0px;
            }
            100% {
                transform: scale(15);
                letter-spacing: 0px;
                opacity: 1;
            }
        }

        @keyframes glowPulseFull {
            0%, 100% {
                text-shadow: 0 0 30px rgba(255,255,255,0.6), 0 0 60px rgba(255,255,255,0.3);
            }
            50% {
                text-shadow: 0 0 80px rgba(255,255,255,1), 0 0 150px rgba(255,255,255,0.8);
            }
        }

        @keyframes taglineSlideUp {
            0% {
                transform: translateY(50px);
                opacity: 0;
                letter-spacing: 20px;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
                letter-spacing: 4px;
            }
        }

        @keyframes fadeOutAfterExpand {
            0% {
                opacity: 1;
                visibility: visible;
            }
            100% {
                opacity: 0;
                visibility: hidden;
            }
        }

        @keyframes backgroundGlow {
            0%, 100% {
                background: linear-gradient(135deg, #ff3300, #0f8b3a);
            }
            50% {
                background: linear-gradient(135deg, #ff5500, #0fa84a);
            }
        }
    </style>
</head>
<body>

    <!-- Netflix-Style Full Screen Expanding M Animation -->
    <div id="entryAnimation" style="
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #ff3300, #0f8b3a);
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        animation: backgroundGlow 2s ease-in-out, fadeOutAfterExpand 1s ease-out forwards;
        animation-delay: 0s, 2.8s;
    ">
        <div style="
            position: absolute;
            text-align: center;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        ">
            <!-- The Letter M - Expands to Full Screen -->
            <div style="
                font-size: 200px;
                font-weight: 900;
                color: white;
                text-shadow: 0 0 50px rgba(255,255,255,0.8);
                animation: mExpandFull 2.5s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards, glowPulseFull 0.8s ease-in-out infinite;
                font-family: 'Segoe UI', 'Arial Black', sans-serif;
                white-space: nowrap;
                display: inline-block;
            ">
                M
            </div>
            
            <!-- Tagline - Appears as M expands -->
            <div style="
                position: absolute;
                bottom: 20%;
                left: 0;
                width: 100%;
                text-align: center;
                animation: taglineSlideUp 0.8s ease-out forwards;
                animation-delay: 1.8s;
                opacity: 0;
            ">
                <div style="
                    font-size: 28px;
                    font-weight: bold;
                    color: white;
                    letter-spacing: 4px;
                    margin-bottom: 10px;
                ">
                    LPG BOOKING
                </div>
                <div style="
                    font-size: 16px;
                    color: rgba(255,255,255,0.9);
                    letter-spacing: 2px;
                ">
                    Gas Booking Made Easy
                </div>
            </div>
        </div>
    </div>

    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <i class="fas fa-fire"></i>
                <span>LPG Booking</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="pages/login.html">Login</a></li>
                <li><a href="pages/register.html">Register</a></li>
            </ul>
        </div>
    </nav>

    <section class="hero">
        <div class="container">
            <h1>Welcome to LPG Gas Booking System</h1>
            <p>Book your LPG cylinder online and get delivery at your doorstep</p>
            <a href="pages/register.html" class="btn btn-primary">Get Started →</a>
        </div>
    </section>

    <section class="cylinders">
        <div class="container">
            <h2>Our Cylinders</h2>
            <div class="cylinder-grid" id="cylinderGrid">
                <div style="text-align: center; grid-column: 1/-1;">
                    <div class="loading-spinner"></div>
                    <p style="margin-top: 1rem; color: #7f8c8d;">Loading cylinders...</p>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <p>&copy; 2024 LPG Booking System. All rights reserved.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script>
        // Check if user is logged in
        const user = JSON.parse(localStorage.getItem('user'));
        if (user) {
            // Update navigation to show user name and My Bookings
            const navMenu = document.querySelector('.nav-menu');
            navMenu.innerHTML = `
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="pages/my-bookings.html">My Bookings</a></li>
                <li><a href="#">Welcome, ${user.name}</a></li>
                <li><a href="#" onclick="logout()">Logout</a></li>
            `;
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.reload();
        }

        // Remove animation element after it finishes
        setTimeout(() => {
            const anim = document.getElementById('entryAnimation');
            if (anim) {
                anim.style.display = 'none';
            }
        }, 3800);
    </script>
    <script src="chat-widget.js"></script>

    <!-- Floating Particles for Extra Drama -->
    <div class="flag-particles" id="flagParticles"></div>
    <div class="chakra">✡</div>

    <script>
        // Create floating particles
        const particles = document.getElementById('flagParticles');
        for (let i = 0; i < 100; i++) {
            const particle = document.createElement('span');
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particle.style.animationDuration = 10 + Math.random() * 10 + 's';
            particle.style.width = Math.random() * 3 + 1 + 'px';
            particle.style.height = particle.style.width;
            particle.style.background = `rgba(255, ${Math.random() * 100 + 100}, 100, 0.5)`;
            particles.appendChild(particle);
        }
    </script>
</body>
</html>
